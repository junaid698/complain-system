<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Complaint Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-indigo-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full glass rounded-3xl shadow-2xl border border-white overflow-hidden">
        <div class="bg-indigo-600 p-8 text-white">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold tracking-tight">ComplaintRegister.io</h1>
                <span class="px-3 py-1 bg-indigo-500 rounded-full text-xs font-mono uppercase tracking-widest">General Purpose</span>
            </div>
            <p class="mt-3 text-indigo-100 text-sm">Submit your grievances to any company. We ensure your message reaches their support inbox and allow them to reply directly to you.</p>
        </div>

        <form id="complaintForm" class="p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Target Company Email</label>
                    <input type="email" id="company_email" required 
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all placeholder:text-gray-300"
                        placeholder="support@company.com">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Your Contact Email</label>
                    <input type="email" id="user_email" required 
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all placeholder:text-gray-300"
                        placeholder="yourname@email.com">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Complaint Subject</label>
                    <input type="text" id="subject" required 
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none"
                        placeholder="e.g. Delayed Delivery #1234">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Urgency Level</label>
                    <select id="priority" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option>Low</option>
                        <option selected>Medium</option>
                        <option>High (Urgent)</option>
                    </select>
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-xs font-bold text-gray-500 uppercase ml-1">Description of Issue</label>
                <textarea id="message" rows="5" required 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none resize-none"
                    placeholder="Describe what happened, including dates and relevant order details..."></textarea>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all active:scale-[0.98]">
                Submit Complaint to Company
            </button>
        </form>

        <div id="statusBox" class="mx-8 mb-8 p-4 rounded-2xl text-center hidden"></div>
        
        <div class="px-8 pb-6 border-t border-gray-100 pt-6 flex items-center justify-between opacity-60">
            <span class="text-[10px] uppercase font-bold text-gray-400">Secure Direct Delivery</span>
            <div class="flex gap-2">
                <div class="h-2 w-2 rounded-full bg-green-400 animate-pulse"></div>
                <span class="text-[10px] font-bold text-gray-400">System Online</span>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        // Replace with your EmailJS Public Key
        (function() {
            emailjs.init("YOUR_PUBLIC_KEY"); 
        })();

        const form = document.getElementById('complaintForm');
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('statusBox');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Dispatching Complaint...";

            const params = {
                to_email: document.getElementById('company_email').value,
                user_email: document.getElementById('user_email').value,
                subject: document.getElementById('subject').value,
                priority: document.getElementById('priority').value,
                message: document.getElementById('message').value
            };

            // Replace with your EmailJS Service ID and Template ID
            emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', params)
                .then(() => {
                    status.className = "mx-8 mb-8 p-4 rounded-2xl text-center bg-green-50 text-green-700 border border-green-200 block";
                    status.innerHTML = "<strong>Sent!</strong> The company will receive your message and can reply directly to your email.";
                    form.reset();
                }, (err) => {
                    status.className = "mx-8 mb-8 p-4 rounded-2xl text-center bg-red-50 text-red-700 border border-red-200 block";
                    status.innerHTML = "<strong>Failed.</strong> Check your EmailJS configuration.";
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.innerText = "Submit Complaint to Company";
                });
        });
    </script>
</body>
</html>
